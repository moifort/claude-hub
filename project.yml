name: ClaudeHub
options:
  bundleIdPrefix: com.thibaut
  deploymentTarget:
    macOS: "26.0"
  xcodeVersion: "26.0"
  minimumXcodeGenVersion: "2.40"
  fileTypes:
    swift:
      buildPhase: sources
settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "26.0"
    SWIFT_STRICT_CONCURRENCY: complete
    PRODUCT_NAME: ClaudeHub
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: 1
    GENERATE_INFOPLIST_FILE: true
    CODE_SIGN_ENTITLEMENTS: ClaudeHub/ClaudeHub.entitlements
    CODE_SIGN_STYLE: Automatic
    INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.developer-tools"
    ENABLE_APP_SANDBOX: false
    ENABLE_HARDENED_RUNTIME: true

packages:
  SwiftTerm:
    url: https://github.com/migueldeicaza/SwiftTerm.git
    from: "1.12.0"

targets:
  ClaudeHub:
    type: application
    platform: macOS
    sources:
      - path: ClaudeHub
    dependencies:
      - package: SwiftTerm
      - sdk: FoundationModels.framework
    settings:
      base:
        INFOPLIST_KEY_NSMainNibFile: ""
        INFOPLIST_KEY_NSPrincipalClass: NSApplication
